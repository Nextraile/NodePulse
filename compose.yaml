services:
  app:
    build: 
      context: .
      dockerfile: Dockerfile.dev
    image: nodepulse/mq-broker:dev
    container_name: nodepulse-app-dev
    user: node
    working_dir: /home/node/app
    environment:
      - NODE_ENV=${APP_ENV}
      - NODE_OPTIONS=--max-old-space-size=${APP_MAX_RAM_MB}
      - UV_THREADPOOL_SIZE=${APP_THREADS}
      - PORT=${HOST_HTTP_PORT}
      - MAX_RETRIES=${MAX_RETRIES}
    ports:
      - "${HOST_HTTP_PORT}:${HOST_HTTP_PORT}"
      - "${HOST_DEBUGGER_PORT}:${DOCKER_DEBUGGER_PORT}"
    command: >
      sh -c "
      if [ ! -f .env ]; then
        echo '.env is not found, copying from .env.example...';
        cp .env.example .env;
      fi && npm run dev
      "
    volumes:
      - .:/home/node/app
      - /home/node/app/node_modules
    develop:
      watch:
        - action: sync
          path: .
          target: /home/node/app
          ignore:
            - node_modules
        - action: rebuild
          path: package.json
    networks:
      - mq_network
    deploy:
      resources:
        limits:
          cpus: '${DOCKER_CPUS_LIMIT}'
          memory: ${DOCKER_MEMORY_LIMIT_MB}m
        reservations:
          cpus: '${DOCKER_CPUS_RESERVATION}'
          memory: ${DOCKER_MEMORY_RESERVATION_MB}m
networks:
  mq_network:
    driver: bridge